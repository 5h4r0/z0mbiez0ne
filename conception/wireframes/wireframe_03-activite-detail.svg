<text x="340" y="250" font-size="7" fill="#2a2a2a" text-anchor="middle">detail-hero__content · padding: 40px 48px · max-width: 1400px</text>

<!-- DETAIL BODY — max-width: 900px centré -->
<rect x="0" y="258" width="680" height="418" fill="white"/>

<!-- description -->
<text x="100" y="294" font-size="10" fill="#888" text-anchor="middle">↑ padding-top: 48px</text>
