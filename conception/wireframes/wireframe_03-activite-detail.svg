<rect x="468" y="480" width="100" height="22" rx="3" fill="#E24B4A"/>
<text x="518" y="495" font-size="8" fill="white" text-anchor="middle" letter-spacing="0.04em">RÉSERVER</text>

<!-- session row 3 -->
<rect x="100" y="522" width="480" height="42" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="0.5"/>
<text x="116" y="538" font-size="9" font-weight="500" fill="#eee">lundi 16 juin à 18h00</text>
<text x="116" y="552" font-size="8" fill="#888">20 places</text>
<text x="390" y="547" font-size="11" font-weight="500" fill="#E24B4A">€29,90</text>
<rect x="468" y="530" width="100" height="22" rx="3" fill="#E24B4A"/>
<text x="518" y="545" font-size="8" fill="white" text-anchor="middle" letter-spacing="0.04em">RÉSERVER</text>

<!-- session rows 4-5 -->
<rect x="100" y="572" width="480" height="42" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="0.5"/>
<rect x="100" y="622" width="480" height="42" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="0.5"/>
<text x="340" y="648" font-size="8" fill="#333" text-anchor="middle">max 6 sessions · /api/sessions?activity_slug=:slug&amp;status=Scheduled&amp;limit=6</text>

<line x1="0" y1="676" x2="680" y2="676" stroke="#e0e0e0" stroke-width="0.5"/>

<!-- NOTES TECHNIQUES -->
<rect x="0" y="676" width="680" height="144" fill="#f0efec"/>
<text x="12" y="694" font-size="8" fill="#888" font-weight="500">Notes techniques</text>
<text x="12" y="708" font-size="8" fill="#999">route : /:slug → DynamicDetailPage (détecte type via /api/activities/by-slug/:slug)</text>
<text x="12" y="720" font-size="8" fill="#999">detail-hero · height: 60vh · min-height: 400px · align-items: flex-end · bg-image cover</text>
<text x="12" y="732" font-size="8" fill="#999">detail-hero__back · ← Toutes les épreuves · lien /les-epreuves · color white/70</text>
<text x="12" y="744" font-size="8" fill="#999">detail-body · max-width: 900px · margin: 0 auto · padding: 48px 24px 80px</text>
<text x="12" y="756" font-size="8" fill="#999">sessions · flex-col · gap-3 · chaque row : flex justify-between flex-wrap · bg surface border rounded-lg px-5 py-4</text>
<text x="12" y="768" font-size="8" fill="#999">session row : date + heure (capitalize) · N places · €prix (red bold) · btn RÉSERVER → /sessions/:id</text>
<text x="12" y="780" font-size="8" fill="#999">états loading : skeleton (div h-60vh + lignes) · error : "Cette épreuve n'existe pas ou a été dévorée"</text>
<text x="12" y="800" font-size="8" fill="#555">03-activite-detail.svg · z0mbiez0ne · Stéphane Rochard</text>
</svg>
