<!-- NOTES TECHNIQUES -->
<rect x="0" y="674" width="680" height="186" fill="#f0efec"/>
<line x1="0" y1="674" x2="680" y2="674" stroke="#ccc" stroke-width="0.5"/>
<text x="12" y="692" font-size="8" fill="#888" font-weight="500">Notes techniques</text>
<text x="12" y="707" font-size="8" fill="#999">page-wrapper · padding-top: 64px (hauteur navbar fixe)</text>
<text x="12" y="719" font-size="8" fill="#999">list-page__header · padding: 80px 24px 0 · max-width: 1400px · text-align: center</text>
<text x="12" y="731" font-size="8" fill="#999">search-input · max-width: 400px · filtre côté client (useState) · désactive Pagination si search actif</text>
<text x="12" y="743" font-size="8" fill="#999">list-page__grid · grid 4 cols (→ 2 cols ≤1024px → 1 col ≤640px) · gap: 24px · margin-bottom: 48px</text>
<text x="12" y="755" font-size="8" fill="#999">activity card · img h-40 object-cover · titre truncate · description line-clamp-2 · icône Clock 14px</text>
<text x="12" y="767" font-size="8" fill="#999">activity card · btn Découvrir (border outline) · lien vers /:slug via activity.slug</text>
<text x="12" y="779" font-size="8" fill="#999">pagination · composant Pagination · buildHref: p => ?page=p · masquée si search.trim() !== ""</text>
<text x="12" y="791" font-size="8" fill="#999">états : loading → SkeletonGrid · error → message · empty → "Aucune épreuve ne correspond"</text>
<text x="12" y="803" font-size="8" fill="#999">données : /api/activities?limit=12&amp;page=N — paginées côté serveur (12/page)</text>
<text x="12" y="815" font-size="8" fill="#999">route : /les-epreuves — active dans la navbar (NavLink isActive)</text>
<text x="12" y="827" font-size="8" fill="#999">responsive · header dark bg · grille s'adapte en 2 cols tablet, 1 col mobile</text>
<text x="12" y="848" font-size="8" fill="#555">02-activites-liste.svg · z0mbiez0ne · Stéphane Rochard</text>
</svg>
