<text x="12" y="1010" font-size="8" fill="#999">sections · padding:80px 24px · max-width:1400px · grid 4 cols (→2 cols ≤1024px → 1 col ≤640px)</text>
<text x="12" y="1022" font-size="8" fill="#999">session card · img h-40 cover · badge date top-left (bg black/80) · badge heure top-right (bg red)</text>
<text x="12" y="1034" font-size="8" fill="#999">activity card · img h-40 cover · description line-clamp-2 · icône Clock 14px · btn Découvrir outline</text>
<text x="12" y="1046" font-size="8" fill="#999">category card · overlay black/50 sur image · icône 36px + titre uppercase · btn Voir la catégorie outline</text>
<text x="12" y="1058" font-size="8" fill="#999">footer · grid-cols-4 · gap-12 · bg #080808 · newsletter input email + bouton bg-red</text>
<text x="12" y="1070" font-size="8" fill="#999">skeleton · SkeletonGrid affiché pendant loading · composant Pagination sur les listes paginées</text>
