<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg" width="680" height="780">
<title>Wireframe — /sessions/:id — détail session</title>
<desc>Page détail session : navbar, hero image + titre, grille 4 metric cards, bloc réservation quantité + total + CTA panier.</desc>
<defs><style>text { font-family: ui-sans-serif, system-ui, Arial, sans-serif; }</style></defs>

<rect width="680" height="780" fill="#f5f4f0" rx="8"/>

<!-- NAVBAR -->
<rect x="0" y="0" width="680" height="40" fill="#0a0a0a" rx="6"/>
<rect x="0" y="34" width="680" height="6" fill="#0a0a0a"/>
<line x1="0" y1="40" x2="680" y2="40" stroke="#222" stroke-width="0.5"/>
<text x="20" y="25" font-size="12" font-weight="500" fill="#c8a84b">the </text>
<text x="43" y="25" font-size="12" font-weight="500" fill="#E24B4A">zØmbie</text>
<text x="96" y="25" font-size="12" font-weight="500" fill="#c8a84b"> zØne</text>
<text x="240" y="25" font-size="10" fill="#666">Activités</text>
<text x="290" y="25" font-size="10" fill="#E24B4A">Sessions</text>
<line x1="290" y1="27" x2="322" y2="27" stroke="#E24B4A" stroke-width="0.8"/>
<text x="334" y="25" font-size="10" fill="#666">Catégories</text>
<text x="396" y="25" font-size="10" fill="#666">Contact</text>
<rect x="440" y="14" width="32" height="14" rx="2" fill="#1c1c1c" stroke="#444" stroke-width="0.5"/>
<text x="445" y="24" font-size="9" fill="#888">🛒 1</text>
<rect x="478" y="13" width="64" height="15" rx="3" fill="#E24B4A"/>
<text x="510" y="24" font-size="9" fill="white" text-anchor="middle">Mon compte</text>

<!-- DETAIL HERO — height: 60vh ~220px -->
<rect x="0" y="40" width="680" height="220" fill="#1a0808"/>
<rect x="0" y="40" width="680" height="220" fill="#0d0505" opacity="0.65"/>
<text x="340" y="95" font-size="8" fill="#333" text-anchor="middle">[ /images/banners/nom-activite.jpg · background-size:cover · background-position:center ]</text>
<text x="340" y="107" font-size="8" fill="#333" text-anchor="middle">overlay gradient-to-top: rgba(0,0,0,0.85) 0% → rgba(0,0,0,0.3) 100%</text>

<!-- back link + titre en bas du hero -->
<text x="48" y="212" font-size="9" fill="rgba(255,255,255,0.6)">← Retour à Survie en zone contaminée</text>
<text x="48" y="234" font-size="16" font-weight="700" fill="white">Survie en zone contaminée — Session du samedi 14 juin 2025</text>
<text x="340" y="248" font-size="7" fill="#2a2a2a" text-anchor="middle">detail-hero__content · padding: 40px 48px</text>

<!-- DETAIL BODY — max-width: 900px centré, padding: 48px 24px 80px -->
<rect x="0" y="260" width="680" height="376" fill="white"/>

<!-- METRIC CARDS — grid auto-fit minmax(160px,1fr) gap-4 -->
<text x="340" y="284" font-size="8" fill="#aaa" text-anchor="middle">grid auto-fit · minmax(160px, 1fr) · gap: 16px · mb-10</text>

<rect x="100" y="292" width="110" height="58" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="0.5"/>
<text x="112" y="310" font-size="7.5" fill="#888" letter-spacing="0.06em">DATE</text>
<text x="112" y="330" font-size="10" font-weight="500" fill="#eee">samedi 14 juin 2025</text>

<rect x="222" y="292" width="110" height="58" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="0.5"/>
<text x="234" y="310" font-size="7.5" fill="#888" letter-spacing="0.06em">HEURE</text>
<text x="234" y="330" font-size="14" font-weight="500" fill="#eee">14h00</text>

<rect x="344" y="292" width="110" height="58" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="0.5"/>
<text x="356" y="310" font-size="7.5" fill="#888" letter-spacing="0.06em">PLACES DISPONIBLES</text>
<text x="356" y="330" font-size="14" font-weight="500" fill="#eee">12</text>

<rect x="466" y="292" width="114" height="58" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="0.5"/>
<text x="478" y="310" font-size="7.5" fill="#888" letter-spacing="0.06em">PRIX UNITAIRE</text>
<text x="478" y="330" font-size="14" font-weight="500" fill="#E24B4A">€29,90</text>

<!-- BLOC RÉSERVATION -->
<rect x="100" y="366" width="480" height="148" rx="5" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="0.5"/>

<!-- titre bloc -->
<text x="124" y="392" font-size="11" font-weight="500" fill="#eee" letter-spacing="0.06em">RÉSERVER VOS PLACES</text>
<line x1="100" y1="400" x2="580" y2="400" stroke="#2a2a2a" stroke-width="0.5"/>

<!-- contrôle quantité -->
<text x="124" y="424" font-size="9" fill="#888">Nombre de places :</text>
<rect x="252" y="412" width="28" height="22" rx="3" fill="#2a2a2a"/>
<text x="266" y="427" font-size="13" fill="#ccc" text-anchor="middle">−</text>
<text x="294" y="427" font-size="13" font-weight="500" fill="#eee" text-anchor="middle">2</text>
<rect x="308" y="412" width="28" height="22" rx="3" fill="#2a2a2a"/>
<text x="322" y="427" font-size="13" fill="#ccc" text-anchor="middle">+</text>
<text x="366" y="424" font-size="8" fill="#555">min: 1 · max: 10</text>

<!-- ligne séparatrice -->
<line x1="120" y1="446" x2="560" y2="446" stroke="#2a2a2a" stroke-width="0.5"/>

<!-- total + CTA -->
<text x="124" y="476" font-size="10" fill="#888">Total :</text>
<text x="172" y="478" font-size="20" font-weight="500" fill="#E24B4A">€59,80</text>
<text x="264" y="468" font-size="7.5" fill="#555">2 × €29,90 · recalculé à chaque ±</text>

<rect x="404" y="462" width="154" height="34" rx="4" fill="#E24B4A"/>
<text x="481" y="483" font-size="10" fill="white" text-anchor="middle" letter-spacing="0.05em">AJOUTER AU PANIER</text>

<!-- annotation flux -->
<text x="340" y="528" font-size="8" fill="#aaa" text-anchor="middle">→ addItem(basketStore) puis navigate('/panier')</text>
<text x="340" y="540" font-size="8" fill="#555" text-anchor="middle">si session déjà dans le panier : quantity += n</text>

<!-- NOTES TECHNIQUES -->
<rect x="0" y="636" width="680" height="144" fill="#f0efec"/>
<line x1="0" y1="636" x2="680" y2="636" stroke="#ccc" stroke-width="0.5"/>
<text x="12" y="654" font-size="8" fill="#888" font-weight="500">Notes techniques</text>
<text x="12" y="668" font-size="8" fill="#999">route : /sessions/:id → SessionDetailPage · /api/sessions/:id</text>
<text x="12" y="680" font-size="8" fill="#999">detail-hero · height: 60vh min-height: 400px · bg-image banners/ · gradient-to-top rgba(0,0,0,0.85→0.3)</text>
<text x="12" y="692" font-size="8" fill="#999">detail-hero__back · ← Retour à [activité.title] · lien /:activité.slug ou /les-epreuves</text>
<text x="12" y="704" font-size="8" fill="#999">metric cards · grid auto-fit minmax(160px,1fr) · gap-4 · bg surface · border · rounded-lg · p-4</text>
<text x="12" y="716" font-size="8" fill="#999">qty · useState(1) · min 1 max 10 · boutons − et + (bg border) · total = qty × unit_price calculé live</text>
<text x="12" y="728" font-size="8" fill="#999">CTA · onClick: addItem puis navigate('/panier') · si déjà présent: incrémente quantity</text>
<text x="12" y="740" font-size="8" fill="#999">panier · Zustand persist ('zz-basket') · totalItems() affiché dans navbar (badge rouge)</text>
<text x="12" y="760" font-size="8" fill="#555">04-session-detail.svg · z0mbiez0ne · Stéphane Rochard</text>
</svg>
